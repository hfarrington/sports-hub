// ─── TZ HELPERS (DST-aware for NZ, Melbourne, Perth) ──────────────────────
// NZ: NZDT (UTC+13) first Sun in Apr → NZST (UTC+12) last Sun in Sep → NZDT (UTC+13)
// Melbourne/VIC: AEDT (UTC+11) first Sun in Apr → AEST (UTC+10) first Sun in Oct → AEDT (UTC+11)
// Perth/WA: AWST (UTC+8) year-round — no DST
function nthSunday(year, month, nth){
  // nth=1 → first Sunday, nth=-1 → last Sunday
  if(nth>0){
    const d=new Date(year,month,1);
    const dow=d.getDay();
    const first=dow===0?1:8-dow;
    return new Date(year,month,first+(nth-1)*7);
  } else {
    const d=new Date(year,month+1,0); // last day of month
    const dow=d.getDay();
    return new Date(year,month,d.getDate()-dow);
  }
}
function getOffset(utcStr, zone){
  if(!utcStr) return null;
  const [dp,tp]=utcStr.split('T');
  const [y,mo,d]=dp.split('-').map(Number);
  const utcDate=new Date(Date.UTC(y,mo-1,d,parseInt(tp.split(':')[0]),parseInt(tp.split(':')[1])));
  if(zone==='AWST') return {off:8,label:'AWST',color:'#ffa040'};
  if(zone==='NZ'){
    // NZ DST: Clocks go forward last Sun of Sep at 2am → NZDT (UTC+13)
    //         Clocks go back first Sun of Apr at 3am → NZST (UTC+12)
    const dstEnd=nthSunday(y,3,1); // first Sun April (month 3)
    dstEnd.setUTCHours(14,0,0,0); // 3am NZDT = 2am NZST = 14:00 UTC
    const dstStart=nthSunday(y,8,-1); // last Sun Sep (month 8)
    dstStart.setUTCHours(14,0,0,0); // 2am NZST = 14:00 UTC
    const isDST = utcDate < dstEnd || utcDate >= dstStart;
    return isDST ? {off:13,label:'NZDT',color:'#00c9ff'} : {off:12,label:'NZST',color:'#00c9ff'};
  }
  if(zone==='MEL'){
    // VIC/NSW DST: Clocks go forward first Sun of Oct at 2am → AEDT (UTC+11)
    //              Clocks go back first Sun of Apr at 3am → AEST (UTC+10)
    const dstEnd=nthSunday(y,3,1); // first Sun April
    dstEnd.setUTCHours(16,0,0,0); // 3am AEDT = 2am AEST = 16:00 UTC
    const dstStart=nthSunday(y,9,1); // first Sun October
    dstStart.setUTCHours(16,0,0,0); // 2am AEST = 16:00 UTC
    const isDST = utcDate < dstEnd || utcDate >= dstStart;
    return isDST ? {off:11,label:'AEDT',color:'#e879f9'} : {off:10,label:'AEST',color:'#e879f9'};
  }
  return {off:0,label:'UTC',color:'#888'};
}
function tzTime(utc, off) {
  if (!utc) return null;
  const [dp, tp] = utc.split('T');
  const [y,mo,d] = dp.split('-').map(Number);
  const [h,m] = tp.split(':').map(Number);
  let mins = h*60+m+off*60;
  const date = new Date(y,mo-1,d);
  if (mins>=1440){mins-=1440;date.setDate(date.getDate()+1);}
  if (mins<0){mins+=1440;date.setDate(date.getDate()-1);}
  const hh=Math.floor(mins/60)%24, mm=mins%60;
  const ap=hh>=12?'pm':'am', h12=hh%12||12;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${days[date.getDay()]} ${h12}${mm?':'+String(mm).padStart(2,'0'):''}${ap}`;
}
function mkTZ(utc){
  if(!utc) return [];
  const nz=getOffset(utc,'NZ');
  const mel=getOffset(utc,'MEL');
  const wa=getOffset(utc,'AWST');
  return [
    {t:tzTime(utc,nz.off),l:nz.label,c:nz.color},
    {t:tzTime(utc,mel.off),l:mel.label,c:mel.color},
    {t:tzTime(utc,wa.off),l:wa.label,c:wa.color},
  ];
}
function utcToDate(utc){
  if(!utc) return null;
  const [dp]=utc.split('T');
  const [y,mo,d]=dp.split('-').map(Number);
  const date=new Date(y,mo-1,d);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[date.getDay()]} ${d} ${months[mo-1]}`;
}

// ─── GENERATE REMAINING WEEKENDS (APR–DEC 2026) ───────────────────────────
(function(){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let d=new Date(2026,3,3); // Start Fri 3 Apr
  const end=new Date(2026,11,28); // End ~28 Dec
  let idx=WEEKENDS.length;
  while(d<=end){
    const fri=new Date(d);
    const sun=new Date(d); sun.setDate(sun.getDate()+2);
    const fD=fri.getDate(),sD=sun.getDate(),fM=fri.getMonth(),sM=sun.getMonth();
    const label=fM===sM?`${fD}–${sD} ${months[fM]}`:`${fD} ${months[fM]}–${sD} ${months[sM]}`;
    const wkLabel=`Wk ${sD} ${months[sM]}`;
    // Match NRL game to this weekend
    const friISO=fri.toISOString().split('T')[0];
    const sunISO=sun.toISOString().split('T')[0];
    let nrlData=null;
    for(const g of NRL_FULL_SEASON){
      if(!g.utc)continue;
      const gd=g.utc.split('T')[0];
      if(gd>=friISO&&gd<=sunISO){
        if(g.bye){nrlData={round:g.round,bye:true,note:'Warriors bye week',games:[]};}
        else{
          const isHome=g.home==='Warriors';
          const opp=isHome?g.away:g.home;
          const res=g.hs!=null?(isHome?(g.hs>g.as?'WIN':'LOSS'):(g.as>g.hs?'WIN':'LOSS')):null;
          nrlData={round:g.round,warriors:{hs:g.hs,as:g.as,opp:opp,result:res},games:[g]};
        }
        break;
      }
    }
    // Check for NRL bye weeks that span this weekend (byes have no utc)
    if(!nrlData){
      for(const g of NRL_FULL_SEASON){
        if(!g.bye||!g.date)continue;
        // Bye dates like "10–11 May" — check if weekend overlaps
        const m=g.date.match(/(\d+).*?(\w+)$/);
        if(m){
          const byeDay=parseInt(m[1]);
          const byeMon=months.indexOf(m[2]);
          if(byeMon>=0&&fM===byeMon&&fD<=byeDay+1&&sD>=byeDay-1){
            nrlData={round:g.round,bye:true,note:'Warriors bye week',games:[]};
            break;
          }
        }
      }
    }
    // Match F1 race to this weekend (check Fri through Mon for Sat/Sun races)
    let f1Data=null;
    for(let dd=0;dd<=3;dd++){
      const chk=new Date(fri);chk.setDate(chk.getDate()+dd);
      const chkISO=chk.toISOString().split('T')[0];
      if(F1_CALENDAR[chkISO]){f1Data=F1_CALENDAR[chkISO];break;}
    }
    WEEKENDS.push({id:'w'+idx,label:label,wkLabel:wkLabel,tag:'future',
      superRugby:null,nrl:nrlData,aLeague:null,f1:f1Data});
    idx++;
    d.setDate(d.getDate()+7);
  }
})();

// ─── DOM BUILDER ───────────────────────────────────────────────────────────
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className')e.className=v;
    else if(k==='style')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
}
function pill(txt,color,pulse){
  return el('span',{className:'pill',style:{background:pulse?color:color+'22',color:pulse?'#fff':color,border:`1px solid ${color}55`,animation:pulse?'pulse 1.5s infinite':'none'}},txt);
}
function tzRow(utc){
  if(!utc) return el('span',{style:{fontSize:'11px',color:'#444'}},'Time TBC');
  const w=el('div',{className:'tzbadges'});
  mkTZ(utc).forEach(b=>w.appendChild(el('span',{className:'tzb',style:{background:b.c+'22',color:b.c,border:`1px solid ${b.c}44`}},`${b.t} ${b.l}`)));
  return w;
}
function venueEl(v){
  return el('div',{className:'venue-t'},el('span',{},v.flag||'📍'),el('span',{},`${v.venue} · ${v.city}, ${v.country}`));
}
function comment(txt){
  return txt?el('div',{className:'comment'},'💬 '+txt):null;
}
function secHead(emoji,title,color,sub){
  const h=el('div',{className:'sec-head'});
  h.appendChild(el('span',{className:'sec-emoji'},emoji));
  const t=el('div',{className:'sec-titles'});
  t.appendChild(el('div',{className:'sec-title'},title));
  if(sub)t.appendChild(el('div',{className:'sec-sub'},sub));
  h.appendChild(t);
  h.appendChild(el('div',{className:'sec-line',style:{background:`linear-gradient(to right,${color}50,transparent)`}}));

}
function card(accent,delay,...ch){
  const c=el('div',{className:'card',style:{border:`1px solid ${accent}22`,animationDelay:`${delay}ms`}});
  ch.flat().forEach(x=>x&&c.appendChild(x));
  return c;
}

// ─── GAME ROW ──────────────────────────────────────────────────────────────
function gameRow(g,accent){
  const done=g.hs!=null&&!g.live;
  const live=!!g.live;
  const cls=`gr ${done?'done':live?'live':'upcoming'}`;
  const row=el('div',{className:cls,style:{borderLeftColor:done?accent+'88':live?'#ff4444':accent+'33'}});
  const top=el('div',{className:'gr-top'});
  const score=done?`${g.hs} – ${g.as}`:live?'LIVE NOW':'KO';
  top.appendChild(el('span',{className:`tn${done||live?' a':''}`},g.home));
  top.appendChild(el('div',{className:'sb',style:{color:done?'#fff':'#555'}},score));
  top.appendChild(el('span',{className:`tn${done||live?' a':''}`},g.away));
  if(done)top.appendChild(pill('FT','#555'));
  if(live)top.appendChild(pill('LIVE','#ff4444',true));
  row.appendChild(top);
  const meta=el('div',{className:'gr-meta'});
  // Date label
  const dateStr=g.date||utcToDate(g.utc);
  if(dateStr) meta.appendChild(el('span',{style:{fontSize:'11px',fontWeight:700,color:'#6a7a8a',marginRight:'4px'}},'📅 '+dateStr));
  meta.appendChild(venueEl(g));
  meta.appendChild(el('div',{style:{flex:'1'}}));
  meta.appendChild(tzRow(g.utc));
  row.appendChild(meta);
  return row;
}

// ─── STANDINGS TABLE ───────────────────────────────────────────────────────
function standingsTable(rows,title,color){
  const wrap=el('div',{style:{marginTop:'14px',paddingTop:'12px',borderTop:`1px solid ${color}22`}});
  wrap.appendChild(el('div',{style:{fontSize:'11px',fontWeight:700,color:color,letterSpacing:'1px',marginBottom:'6px',textTransform:'uppercase'}},title));
  const tbl=el('table',{className:'stbl'});
  const hdr=el('tr');
  ['#','Team','P','W','L','Diff','Pts'].forEach((h,i)=>{
    hdr.appendChild(el('th',{className:i>1?'r':''},h));
  });
  tbl.appendChild(hdr);
  rows.forEach(r=>{
    const tr=el('tr',{className:r.champion?'champ':r.pos<=3?'top':''});
    tr.appendChild(el('td',{className:'rank',style:{color:r.pos===1?'#ffd700':r.pos<=3?color:'#555'}},r.pos+''));
    tr.appendChild(el('td',{},r.team+(r.champion?' 🏆':'')));
    [r.p,r.w,r.l,r.diff].forEach(v=>tr.appendChild(el('td',{className:'r'},v+'')));
    tr.appendChild(el('td',{className:'r pts'},r.pts+''));
    tbl.appendChild(tr);
  });
  wrap.appendChild(tbl);
  return wrap;
}

  wi.appendChild(el('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'16px',color:'#fff'}},w.wkLabel));
  wi.appendChild(el('div',{style:{fontSize:'10px',color:'#666'}},w.label));
  nav.appendChild(pb); nav.appendChild(wi); nav.appendChild(nb);
  nav.appendChild(pill(TL[w.tag],TC[w.tag],w.tag==='current'));
  con.appendChild(nav);
  const wr=el('div',{style:{display:'flex',gap:'4px',alignItems:'stretch',overflowX:'auto',paddingBottom:'6px',scrollBehavior:'smooth'}});
  wr.id='tl-scroll';
  WEEKENDS.forEach((wkx,i)=>{
    const act=i===wk;
    const b=el('button',{className:'wk-btn',style:{borderColor:act?TC[wkx.tag]:'rgba(255,255,255,0.07)',background:act?TC[wkx.tag]+'18':'rgba(255,255,255,0.03)',minWidth:'70px',flexShrink:'0'},onClick:()=>{wk=i;render();}});
    b.appendChild(el('div',{className:'wk-lbl',style:{color:act?TC[wkx.tag]:'#555'}},wkx.wkLabel));
    b.appendChild(el('div',{className:'wk-dt',style:{color:act?TC[wkx.tag]+'cc':'#444'}},wkx.label));
    if(wkx.tag==='current')b.appendChild(el('div',{className:'dot'}));
    if(act) b.id='tl-active';
    wr.appendChild(b);
  });
  con.appendChild(wr);
  // Auto-scroll to active week after render
  setTimeout(()=>{
    const activeBtn=document.getElementById('tl-active');
    if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },50);
  const trk=el('div',{className:'track-bar'});
  const pct=(wk/(WEEKENDS.length-1))*100;
  trk.appendChild(el('div',{className:'track-fill',style:{left:`${pct}%`,width:`${Math.max(2,100/WEEKENDS.length)}%`,background:TC[w.tag]}}));
  con.appendChild(trk);
  // Time period toggle
  const yt=el('div',{className:'year-toggle'});
  yt.appendChild(el('span',{style:{fontSize:'11px',color:'#666',marginRight:'4px'}},'Time:'));
  const timeOpts=[
    ['Weekends','week','#00c9ff'],
    ['2026','2026','#b0ff4e'],
    ['2027','2027','#ffa040'],
  ];
  timeOpts.forEach(([lbl,val,col])=>{
    const active=timeView===val;
    const b=el('button',{className:`sfbtn${active?' on':''}`,
      style:active?{borderColor:col,background:col+'18',color:col}:{},
      onClick:()=>{timeView=val;render();}});
    b.textContent=lbl;
    yt.appendChild(b);
  });
  // History toggle (only relevant in Weekends view)
  if(timeView==='week'){
    yt.appendChild(el('span',{style:{fontSize:'11px',color:'#666',marginLeft:'10px',marginRight:'4px'}},'|'));
    const hBtn=el('button',{className:`sfbtn${showHistory?' on':''}`,
      style:showHistory?{borderColor:'#e879f9',background:'#e879f920',color:'#e879f9'}:{},
      onClick:()=>{showHistory=!showHistory;render();}});
    hBtn.textContent='History';
    yt.appendChild(hBtn);
  }
  con.appendChild(yt);
  return con;
}

// ─── MAIN RENDER ───────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  const w=WEEKENDS[wk];
  const isPast=w.tag==='past'||w.tag==='current';

  const showSRSection=showRugby&&(rugbyAll||rugbySR);
  const showABSection=showRugby&&(rugbyAll||rugbyAB);
  const showWALSection=showRugby&&(rugbyAll||rugbyWAL);
  const showSBSection=showRugby&&(rugbyAll||rugbySB);
  const show6NSection=showRugby&&(rugbyAll||rugby6N);
  const showRWCSection=showRugby&&(rugbyAll||rugbyRWC);
  const showAL=showFootball&&(footAll||footAL);
  const showAWSection=showFootball&&(footAll||footAW);
  const showSOCSection=showFootball&&(footAll||footSOC);

  // HEADER
  const hdr=el('div',{style:{background:'rgba(0,0,0,0.7)',borderBottom:'1px solid rgba(255,255,255,0.07)',padding:'16px 22px 14px',backdropFilter:'blur(16px)',position:'sticky',top:'0',zIndex:'100',animation:'fadeIn 0.3s ease'}});
  const hIn=el('div',{style:{maxWidth:'960px',margin:'0 auto'}});

  const trow=el('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'14px',flexWrap:'wrap',gap:'10px'}});
  const tblk=el('div');
  tblk.appendChild(el('div',{html:'Sports <span style="color:#00c9ff">Hub</span>',style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:'25px',letterSpacing:'2px',color:'#fff',textTransform:'uppercase'}}));
  tblk.appendChild(el('div',{style:{fontSize:'10px',color:'#555',letterSpacing:'1px'}},'NZ · Melbourne · Perth Times'));
  trow.appendChild(tblk);

  const fcol=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',alignItems:'flex-end'}});

  // Row 1: Top-level sport filters
  const fr1=el('div',{className:'frow',style:{justifyContent:'flex-end'}});
  [['NRL / Warriors','nrl',showNRL,()=>{showNRL=!showNRL;render();},'#b0ff4e','Warriors'],
   ['F1','f1',showF1,()=>{showF1=!showF1;render();},'#ff1801','F1'],
   ['Rugby','rugby',showRugby,()=>{showRugby=!showRugby;render();},'#c9a227','All Blacks'],
   ['Football','football',showFootball,()=>{showFootball=!showFootball;render();},'#5b21b6','A-League'],
  ].forEach(([lbl,,isOn,fn,col,logoKey])=>{
    const b=el('button',{className:`fbtn${isOn?' on':''}`,onClick:fn});
    if(logoKey&&TEAM_LOGOS[logoKey]){const img=logoImg(TEAM_LOGOS[logoKey],16);img.style.opacity=isOn?'1':'0.5';b.appendChild(img);}
    b.appendChild(document.createTextNode(' '+lbl));
    if(isOn){b.style.borderColor=col;b.style.background=col+'18';b.style.color=col;}
    fr1.appendChild(b);
  });
  fcol.appendChild(fr1);

  // Row 2: Rugby sub-filters (only when Rugby is on)
  if(showRugby){
    const fr2=el('div',{className:'frow',style:{justifyContent:'flex-end',alignItems:'center',gap:'5px'}});
    fr2.appendChild(el('span',{style:{fontSize:'10px',color:'#555',marginRight:'2px'}},'Filter:'));
    const filters=[
      ['ALL','ALL','#c9a227',null,'🏉'],
      ['Super Rugby','SR','#00c9ff','Super Rugby'],
      ['All Blacks','AB','#cccccc','All Blacks'],
      ['Wallabies','WAL','#FFD700','Wallabies'],
      ['Springboks','SB','#00703c','Springboks'],
      ['6 Nations','6N','#e8c53a','Six Nations'],
      ['RWC 2027','RWC','#ffa040','RWC 2027'],
    ];
    filters.forEach(([lbl,key,col,logoKey,emoji])=>{
      const active=key==='ALL'?rugbyAll:(key==='SR'?rugbySR:key==='AB'?rugbyAB:key==='WAL'?rugbyWAL:key==='SB'?rugbySB:key==='6N'?rugby6N:rugbyRWC);
      const btn=subFilterBtn(lbl,active,col,()=>toggleRugbyFilter(key),logoKey,emoji);
      if(rugbyAll&&key!=='ALL'){
        btn.style.opacity='0.5';
        btn.style.borderColor=col+'44';
        btn.style.color=col+'88';
        btn.style.background='transparent';
      }
      fr2.appendChild(btn);
    });
    fcol.appendChild(fr2);
  }

  // Row 3: Football sub-filters (only when Football is on)
  if(showFootball){
    const fr3=el('div',{className:'frow',style:{justifyContent:'flex-end',alignItems:'center',gap:'5px'}});
    fr3.appendChild(el('span',{style:{fontSize:'10px',color:'#555',marginRight:'2px'}},'Filter:'));
    const fFilters=[
      ['ALL','ALL','#5b21b6',null,'⚽'],
      ['A-League','AL','#ff6b35','A-League'],
      ['All Whites WC26','AW','#fff','All Whites'],
      ['Socceroos WC26','SOC','#FFD700','Socceroos'],
    ];
    fFilters.forEach(([lbl,key,col,logoKey,emoji])=>{
      const active=key==='ALL'?footAll:(key==='AL'?footAL:key==='AW'?footAW:footSOC);
      const btn=subFilterBtn(lbl,active,col,()=>toggleFootballFilter(key),logoKey,emoji);
      if(footAll&&key!=='ALL'){
        btn.style.opacity='0.5';
        btn.style.borderColor=col+'44';
        btn.style.color=col+'88';
        btn.style.background='transparent';
      }
      fr3.appendChild(btn);
    });
    fcol.appendChild(fr3);
  }

  trow.appendChild(fcol);
  hIn.appendChild(trow);
  hIn.appendChild(buildTimeline());
  hdr.appendChild(hIn);
  app.appendChild(hdr);

  // CONTENT
  const con=el('div',{style:{maxWidth:'960px',margin:'24px auto 0',padding:'0 18px'}});

  const leg=el('div',{className:'legend'});
  leg.appendChild(el('span',{style:{fontSize:'11px',color:'#666'}},'Times:'));
  [['NZ = NZDT +13 / NZST +12','#00c9ff'],['MEL = AEDT +11 / AEST +10','#e879f9'],['PERTH = AWST +8','#ffa040']].forEach(([t,c])=>{
    leg.appendChild(el('span',{className:'tzb',style:{background:c+'22',color:c,border:`1px solid ${c}44`}},t));
  });
  leg.appendChild(el('span',{style:{fontSize:'10px',color:'#555'}},'DST auto-adjusts'));
  con.appendChild(leg);

  // ─── 2027 VIEW ───
  if(timeView==='2027'){
    if(showRWCSection) { const rwcNode=rwc2027Section(); if(rwcNode) con.appendChild(rwcNode); }
    // Placeholder for other 2027 schedules
    const ph=card('#555',30);
    ph.appendChild(secHead('📅','Other 2027 Schedules','#555','Coming Soon'));
    ph.appendChild(el('div',{style:{padding:'14px',textAlign:'center',color:'#555',fontSize:'13px',fontStyle:'italic',lineHeight:'1.6'}},
      'Super Rugby Pacific, NRL, Nations Championship, A-League & F1 schedules will be added as confirmed.'));
    con.appendChild(ph);
    app.appendChild(con);
    return;
  }

  // Helper: only appendChild if node is not null
  const add=(node)=>{if(node)con.appendChild(node);};

  // ─── GLOBAL SECTIONS (tournaments / internationals) ───
  // Only show when History is ON or in year views — not in single-weekend mode
  const showGlobal=showHistory||timeView!=='week';
  if(showGlobal){
    if(show6NSection) add(sixNationsSection());
    if(showABSection) add(intlSection(ALL_BLACKS,'All Blacks','#cccccc','🖤'));
    if(showWALSection) add(intlSection(WALLABIES,'Wallabies','#FFD700','💛'));
    if(showSBSection) add(intlSection(SPRINGBOKS,'Springboks','#00703c','💚'));
    if(showAWSection) add(wcSection(ALL_WHITES_WC,'All Whites','#fff','🇳🇿','Group G · Belgium, Egypt, Iran'));
    if(showSOCSection) add(wcSection(SOCCEROOS_WC,'Socceroos','#FFD700','🇦🇺','Group D · USA, Paraguay, UEFA PO-C'));
    if(showRWCSection) add(rwc2027Section());
  }

  // ─── WEEKEND SECTIONS ───
  if(timeView==='week'&&showHistory){
    // HISTORY ON: show all weekends from selected down to first
    for(let i=wk;i>=0;i--){
      const wi=WEEKENDS[i];
      const wiPast=wi.tag==='past'||wi.tag==='current';
      const hasContent=(showSRSection&&wi.superRugby)||(showNRL&&wi.nrl)||(showAL&&wi.aLeague)||(showF1&&wi.f1);
      if(!hasContent) continue;
      // Weekend divider header
      const wkHdr=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',margin:(i===wk?'4px 0 10px':'28px 0 10px'),padding:'0 4px'}});
      wkHdr.appendChild(el('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'14px',letterSpacing:'1px',color:TC[wi.tag],textTransform:'uppercase',whiteSpace:'nowrap'}},wi.wkLabel+' · '+wi.label));
      wkHdr.appendChild(el('div',{style:{flex:'1',height:'1px',background:TC[wi.tag]+'33'}}));
      if(i===wk) wkHdr.appendChild(pill(TL[wi.tag],TC[wi.tag],wi.tag==='current'));
      con.appendChild(wkHdr);
      if(showSRSection) add(superRugbySection(wi.superRugby,wiPast));
      if(showNRL) add(nrlSection(wi.nrl));
      if(showAL) add(aLeagueSection(wi.aLeague));
      if(showF1) add(f1Section(wi.f1));
      if(wi.tag==='future') con.appendChild(el('div',{className:'future-note'},'🔮 Upcoming — fixtures & times shown, results to come'));
    }
  } else if(timeView==='week'){
    // HISTORY OFF: show selected weekend + all future weekends (no past results)
    for(let i=wk;i<WEEKENDS.length;i++){
      const wi=WEEKENDS[i];
      // Skip past weekends that aren't the selected one
      if(i!==wk&&wi.tag==='past') continue;
      const wiPast=wi.tag==='past'||wi.tag==='current';
      const hasContent=(showSRSection&&wi.superRugby)||(showNRL&&wi.nrl)||(showAL&&wi.aLeague)||(showF1&&wi.f1);
      if(!hasContent) continue;
      // Weekend divider header
      const wkHdr=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',margin:(i===wk?'4px 0 10px':'28px 0 10px'),padding:'0 4px'}});
      wkHdr.appendChild(el('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:'14px',letterSpacing:'1px',color:TC[wi.tag],textTransform:'uppercase',whiteSpace:'nowrap'}},wi.wkLabel+' · '+wi.label));
      wkHdr.appendChild(el('div',{style:{flex:'1',height:'1px',background:TC[wi.tag]+'33'}}));
      if(i===wk) wkHdr.appendChild(pill(TL[wi.tag],TC[wi.tag],wi.tag==='current'));
      con.appendChild(wkHdr);
      if(showSRSection) add(superRugbySection(wi.superRugby,wiPast));
      if(showNRL) add(nrlSection(wi.nrl));
      if(showAL) add(aLeagueSection(wi.aLeague));
      if(showF1) add(f1Section(wi.f1));
      if(wi.tag==='future') con.appendChild(el('div',{className:'future-note'},'🔮 Upcoming — fixtures & times shown, results to come'));
    }
  } else {
    // Year views (2026/2027)
    if(showSRSection) add(superRugbySection(w.superRugby,isPast));
    if(showNRL) add(nrlYearSection());
    if(showAL) add(aLeagueSection(w.aLeague));
    if(showF1) add(f1Section(w.f1));
  }

  app.appendChild(con);
}

render();
</script>
</body>
</html>
