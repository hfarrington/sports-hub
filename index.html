<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sports Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(150deg,#060a11 0%,#0b1320 60%,#070d17 100%);font-family:'Barlow',sans-serif;color:#dde4f0;min-height:100vh;padding-bottom:60px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}::-webkit-scrollbar-track{background:transparent}
button{cursor:pointer;font-family:'Barlow Condensed',sans-serif;transition:all 0.18s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.card{background:rgba(255,255,255,0.025);border-radius:14px;padding:18px 20px;margin-bottom:18px;animation:fadeIn 0.3s ease both}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-emoji{font-size:22px;flex-shrink:0}
.sec-titles{min-width:0}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;letter-spacing:1px;color:#fff;text-transform:uppercase;line-height:1}
.sec-sub{font-size:11px;color:#666;margin-top:2px}
.sec-line{flex:1;height:1px;margin-left:4px;flex-shrink:0}
/* game rows */
.gr{padding:10px 14px;margin-bottom:7px;border-radius:8px;border-left:3px solid transparent}
.gr.done{background:rgba(255,255,255,0.03)}
.gr.live{background:rgba(255,68,68,0.07);border-left-color:#ff4444!important}
.gr.upcoming{background:rgba(255,255,255,0.02)}
.gr-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;flex:1;color:#888;min-width:70px}
.tn.a{color:#fff}
.sb{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;background:rgba(255,255,255,0.06);padding:4px 14px;border-radius:5px;min-width:90px;text-align:center;white-space:nowrap}
.gr-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.venue-t{font-size:12px;color:#5a5a6a;display:flex;align-items:center;gap:3px}
.tzbadges{display:flex;gap:4px;flex-wrap:wrap}
.tzb{font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:0.5px;white-space:nowrap}
.pill{font-size:11px;font-weight:800;padding:3px 8px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
/* filter buttons */
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#666;font-weight:700;font-size:12px;letter-spacing:0.8px;text-transform:uppercase}
.fbtn.on{background:rgba(0,201,255,0.12);border-color:#00c9ff;color:#00c9ff}
/* toggle buttons */
.tbtn{padding:6px 15px;border-radius:8px;border:2px solid;font-weight:800;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.tbtn.off{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.12);color:#555}
/* sub-filter buttons for rugby */
.sfbtn{padding:4px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#555;font-weight:700;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.15s}
.sfbtn.on{color:#fff}
/* timeline */
.tl-wrap{background:rgba(255,255,255,0.04);border-radius:12px;padding:14px 18px;border:1px solid rgba(255,255,255,0.08)}
.wk-btn{flex:1;padding:8px 5px;border-radius:8px;text-align:center;border:1px solid transparent;background:rgba(255,255,255,0.03)}
.wk-btn:hover{background:rgba(255,255,255,0.06)}
.wk-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wk-dt{font-size:9px;margin-top:1px}
.dot{width:4px;height:4px;border-radius:50%;background:#00c9ff;margin:3px auto 0;animation:pulse 1.5s infinite}
.nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0}
.nav-btn:disabled{background:rgba(255,255,255,0.03);color:#444}
/* warriors highlight */
.w-hl{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:10px;border-radius:10px;background:rgba(176,255,78,0.06);border:1px solid rgba(176,255,78,0.2)}
/* standings table */
.stbl{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.stbl th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;color:#555;text-align:left;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.06);text-transform:uppercase}
.stbl th.r,.stbl td.r{text-align:right;padding-right:12px}
.stbl td{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.03)}
.stbl td.num{color:#b0ff4e}
.stbl td.act{color:#00c9ff}
.stbl .nm{font-weight:700;color:#fff}
/* rankings */
.rnk{display:flex;flex-direction:column;gap:7px}
.rnk-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;background:rgba(255,255,255,0.02)}
.rnk-num{min-width:25px;text-align:center;font-weight:700;color:#b0ff4e}
.rnk-name{flex:1;color:#fff;font-weight:600;font-size:14px}
.rnk-info{font-size:11px;color:#666}
/* future note */
.future-note{background:rgba(255,160,64,0.1);border-left:3px solid #ffa040;padding:14px;border-radius:6px;color:#ff9c66;font-size:13px;line-height:1.5}
</style>
</head>
<body>
<div id="app"></div>
<script>
// Data constants
const WEEKENDS = [
